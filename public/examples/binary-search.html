<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binary Search Demo</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #0b1020;
        color: #e5e7eb;
        padding: 2rem 1rem 3rem;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin: 1.5rem 0;
      }

      input,
      button {
        font: inherit;
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        border: 1px solid #374151;
        background: #111827;
        color: inherit;
      }

      button {
        cursor: pointer;
        background: #2563eb;
        border-color: #2563eb;
      }

      .bar-row {
        display: flex;
        gap: 0.35rem;
        align-items: flex-end;
        height: 180px;
        margin: 1.5rem 0;
      }

      .bar {
        flex: 1;
        background: #374151;
        border-radius: 6px 6px 0 0;
        position: relative;
        transition: background 0.2s;
      }

      .bar.active {
        background: #f59e0b;
      }

      .bar.found {
        background: #22c55e;
      }

      .bar span {
        position: absolute;
        bottom: -1.4rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: #9ca3af;
      }

      .log {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 1rem;
        min-height: 4rem;
        white-space: pre-wrap;
      }

      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Binary Search Demo</h1>
      <p>Search for a value in a sorted array.</p>

      <div class="controls">
        <input id="target" type="number" value="42" />
        <button id="search">Search</button>
        <button id="reset">Reset</button>
      </div>

      <div class="bar-row" id="bars"></div>
      <div class="log" id="log">Click Search to run binary search.</div>
      <p><a href="../index.html">Back to index</a></p>
    </main>

    <script>
      const values = [4, 12, 19, 27, 33, 42, 58, 61, 73, 88];
      const barsEl = document.getElementById("bars");
      const logEl = document.getElementById("log");
      const targetEl = document.getElementById("target");

      function renderBars(active = -1, found = -1) {
        const max = Math.max(...values);
        barsEl.innerHTML = values
          .map((value, index) => {
            const height = (value / max) * 100;
            const classes = [
              "bar",
              index === active ? "active" : "",
              index === found ? "found" : "",
            ]
              .filter(Boolean)
              .join(" ");
            return `<div class="${classes}" style="height:${height}%"><span>${value}</span></div>`;
          })
          .join("");
      }

      async function binarySearch(target) {
        let left = 0;
        let right = values.length - 1;

        while (left <= right) {
          const mid = Math.floor((left + right) / 2);
          renderBars(mid);
          logEl.textContent = `Checking index ${mid} (value ${values[mid]})`;

          await new Promise((resolve) => setTimeout(resolve, 700));

          if (values[mid] === target) {
            renderBars(mid, mid);
            logEl.textContent = `Found ${target} at index ${mid}.`;
            return;
          }

          if (values[mid] < target) {
            left = mid + 1;
            logEl.textContent += `\n${values[mid]} < ${target}, search right half.`;
          } else {
            right = mid - 1;
            logEl.textContent += `\n${values[mid]} > ${target}, search left half.`;
          }

          await new Promise((resolve) => setTimeout(resolve, 400));
        }

        renderBars();
        logEl.textContent = `${target} is not in the array.`;
      }

      document.getElementById("search").addEventListener("click", () => {
        binarySearch(Number(targetEl.value));
      });

      document.getElementById("reset").addEventListener("click", () => {
        logEl.textContent = "Click Search to run binary search.";
        renderBars();
      });

      renderBars();
    </script>
  </body>
</html>
